<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="1.jpg" type="image/x-icon">
    <title>ScheduGraph</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <p><img src="1.jpg" width="50" height="50"></p>
        <p>Home</p>
        <p>Create Account</p>
    </header>

    <div id="page">
        <div id="help-bar">
            <h1><i>📊 Let's get started.</i></h1>
            <p><code>Get organized today with ScheduGraph.</code></p>
            <button class="create-account" onclick="createAccount()">+ Create Account</button>
            <button class="login-button" onclick="showLoginForm()">Login</button>

            <div id="accountForm" style="text-align: center;"></div>
            <div id="loginForm" style="display: none; text-align: center;"></div>
        </div>

        <div id="get-started-notes">
            <h1>Documentation</h1>
            <h2 id="how-to-get-started">How to get started.</h2>
            <p>ScheduGraph helps you save and organize notes, links, and tasks.</p>
            <ol>
                <li id="step1">Go to the left-hand bar.</li>
                <li id="step2">Fill in your details and start saving.</li>
            </ol>
        </div>
    </div>

    <footer>
        <span>&copy; ScheduGraph. All rights reserved.</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
